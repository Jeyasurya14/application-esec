<div class="sub-tab-host">
  <div class="sub-tab-strip">
    @for (tab of tabs(); track tab.id) {
      <button class="sub-tab" [class.active]="activeId() === tab.id" (click)="selectTab(tab)">
        {{ tab.label }}
      </button>
    }
  </div>
  
   @if (activeTab()?.children; as childTabs) {
    @if (childTabs.length > 0) {
      <div class="sub-tab-strip child-strip">
        @for (child of childTabs; track child.id) {
          <button class="sub-tab child-tab" 
                  [class.active]="activeChildId() === child.id" 
                  (click)="selectChildTab(child)">
            {{ child.label }}
          </button>
        }
      </div>
    }
  }
  <div class="sub-tab-body">
    @for (ctx of activeGridContexts(); track ctx.tabId) {
      <framework-grid [context]="ctx" />
    }
  </div>
</div>
