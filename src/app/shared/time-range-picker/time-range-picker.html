<div class="time-picker">
    <button 
    class="time-display" 
    type="button" 
    (click)="toggle()">
        <i class="bi bi-clock"></i>
        {{displayTime()}}
        @if(isOpen()){
            <i class="bi bi-chevron-up"></i>
        }@else {
            <i class="bi bi-chevron-down"></i>
        }
    </button>
    @if(isOpen()){
   <div class="popup">
     <div class="time-section">
        <span class="time-label">Start Time</span>
        <div class="time-input-group">
            <input type="text" maxlength="2" [value]="startHour()" (input)="startHour.set($any($event.target).value); emit()" (blur)="validateTime()">
            <span class="colon">:</span>
            <input type="text" maxlength="2" [value]="startMinute()" (input)="startMinute.set($any($event.target).value); emit()" (blur)="validateTime()">
        </div>
     </div>
     <div class="time-section">
        <span class="time-label">End Time</span>
        <div class="time-input-group">
            <input type="text" maxlength="2" [value]="endHour()" (input)="endHour.set($any($event.target).value); emit()" (blur)="validateTime()">
            <span class="colon">:</span>
            <input type="text" maxlength="2" [value]="endMinute()" (input)="endMinute.set($any($event.target).value); emit()" (blur)="validateTime()">
        </div>
     </div>
     </div>
    }
    
</div>
