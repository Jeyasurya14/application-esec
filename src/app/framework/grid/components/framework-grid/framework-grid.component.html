<div class="framework-grid">
  @if (context().toolbar) {
    <framework-grid-toolbar [toolbar]="context().toolbar!"> </framework-grid-toolbar>
  }

  @if (kpiConfig()) {
    <kpi-cards [config]="kpiConfig()!" />
  }

  @if (filterConfig()) {
    <app-filter-bar
      [config]="filterConfig()!"
      [tabId]="context().tabId"
      (changed)="onFiltersChanged($event)"
    />
  }

  <ag-grid-angular
    [class]="theme()"
    style="width: 100%; height: 100%"
    [gridOptions]="gridOptions()"
    [columnDefs]="columns()"
    [rowData]="rowData()"
    (gridReady)="gridReady($event)"
    (selectionChanged)="selectionChanged($event)"
    (columnMoved)="columnMoved()"
    (columnResized)="columnResized($event)"
    (columnVisible)="columnVisible()"
  >
  </ag-grid-angular>

  <framework-grid-status-bar> </framework-grid-status-bar>
</div>
